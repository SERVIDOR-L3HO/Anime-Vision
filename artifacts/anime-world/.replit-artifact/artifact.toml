kind = "web"
previewPath = "/"
title = "AnimeWorld - Tu Portal de Anime"
version = "1.0.0"
id = "artifacts/anime-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26033
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/anime-world run dev"

[services.env]
PORT = "26033"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/anime-world", "run", "build"]
publicDir = "artifacts/anime-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
